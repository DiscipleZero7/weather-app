<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <h1 class="title-header">What's the Weather in...?</h1>
    <div class="weather-data-container"></div>
    <div class="loading-status"></div>
    <form class="weather-form">
      <input class="weather-input" type="text">
      <div class="button-container">
        <button class="weather-submit-button">Get Weather!</button>
        <button class="temp-converter-button" type="button">Fahrenheit / Celsius</button>
      </div>
    </form>
  </body>
</html>
